# Bootstrap dependencies for xeetapus

# Build tools
make = command -v make
wget = command -v wget

[perl]
check = command -v perl
stage = perl.sh
needs =
uses = c99-compiler

[gmp]
check = [ -f "$PREFIX/lib/libgmp.a" ] || pkg-config --exists gmp || ldconfig -p | grep -q libgmp
stage = gmp.sh
needs =

[mpfr]
check = [ -f "$PREFIX/lib/libmpfr.a" ] || pkg-config --exists mpfr || ldconfig -p | grep -q libmpfr
stage = mpfr.sh
needs = gmp

[mpc]
check = [ -f "$PREFIX/lib/libmpc.a" ] || pkg-config --exists mpc || ldconfig -p | grep -q libmpc
stage = mpc.sh
needs = mpfr

[ncurses]
check = [ -f "$PREFIX/lib/libncurses.a" ] || pkg-config --exists ncurses || ldconfig -p | grep -q libncurses
stage = ncurses.sh
needs =

[gcc-c11]
check = [ -x "$PREFIX/bin/gcc" ]
stage = gcc-c11.sh
needs = gmp mpfr mpc
uses = c89-compiler

[zig]
check = command -v zig || [ -x "$PREFIX/bin/zig" ]
stage = zig-stage0.sh
needs = gcc-c11
uses = c11-compiler

[sqlite]
check = pkg-config --exists sqlite3 || [ -f "$PREFIX/lib/libsqlite3.a" ]
stage = sqlite.sh
needs =

[texinfo]
check = command -v texi2any || [ -x "$PREFIX/bin/texi2any" ]
stage = texinfo.sh
needs = ncurses perl
